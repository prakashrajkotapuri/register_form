<!DOCTYPE html>
<html lang="en">
<head>
<title>Register Page</title>
</head>

<body>

<h2>Register Page</h2>

<form action="./login.html">

<p>
<input type="text" placeholder="Enter name" name="name"/>
</p>

<p>
<input type="email" placeholder="Enter email" name="email"/>
</p>

<p>
<input type="password" placeholder="Enter password" name="password"/>
</p>

<p>
<input type="password" placeholder="Confirm password" name="confirm_password"/>
</p>

<p>
<input type="number" placeholder="Enter mobile number" name="mobile_number"/>
</p>

<p>
<input type="radio" name="gender" value="Male"/>Male
<input type="radio" name="gender" value="Female"/>Female
</p>

<p>
<input type="checkbox"/>10th
<input type="checkbox"/>Inter
<input type="checkbox"/>B.tech
</p>

<p>
<select>
<option value="">Select your city</option>
<option value="Kandukur">Kandukur</option>
<option value="Ongole">Ongole</option>
<option value="Chennai">Chennai</option>
</select>
</p>

<p>
<input type="date"/>
</p>

<p>
Profile Picture:
<input type="file" name="profile_pic"/>
</p>

<p>
<button><b>Register</b></button>
</p>

</form>

</body>
</html>
